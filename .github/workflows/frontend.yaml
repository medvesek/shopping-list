name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - cli/lkw/**
      - .github/workflows/frontend.yaml

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Build
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Deploy
        uses: medvesek/infrastructure/github-actions/lkwdeploy@master
        with:
          cloudflare-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          server-ip: ${{ secrets.AQUILA_IP }}
          ssh-user: ${{ secrets.SSH_USER }}
          ssh-private-key: ${{ secrets.SSH_KEY_PRIVATE_GITHUB_ACTIONS }}
          config: frontend/lkw.yaml
